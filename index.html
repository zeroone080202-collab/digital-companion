<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#123d78">
  <meta name="description" content="고령층을 위한 KTX, 서울 지하철, GTX-A 실전형 교통 이용 연습">
  <title>생활교통 실전연습</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header class="global-header">
    <button class="home-logo" type="button" data-action="home">
      <span class="logo-mark">길</span>
      <span><strong>생활교통 실전연습</strong><small>실제 이용 전에 안전하게 연습하세요</small></span>
    </button>
    <div class="access-tools">
      <button type="button" data-action="font-minus">글자 작게</button>
      <button type="button" data-action="font-plus">글자 크게</button>
      <button type="button" data-action="speak">화면 읽기</button>
      <button type="button" data-action="contrast">고대비</button>
    </div>
  </header>

  <main>
    <section id="home" class="home-page">
      <div class="hero-simple">
        <div>
          <span class="edu-label">교육용 모의 시스템</span>
          <h1>실제 교통 이용을<br>미리 연습해 보세요</h1>
          <p>실제 예약·결제는 이루어지지 않습니다. 화면과 조작 순서를 반복해서 익혀보세요.</p>
        </div>
        <div class="hero-device" aria-hidden="true">
          <div class="device-screen"><span>연습 준비</span><strong>화면을 눌러 시작</strong></div>
          <div class="device-panel"><i></i><i></i><i></i></div>
        </div>
      </div>

      <section class="select-section">
        <p class="eyebrow">연습 선택</p>
        <h2>무엇을 연습하시겠어요?</h2>
        <div class="select-grid">
          <button class="select-card" data-start="ktx">
            <span class="select-icon">🚄</span>
            <span><strong>KTX 승차권 예매</strong><small>열차 조회, 좌석 선택, 승차권 확인</small></span>
            <b>시작하기</b>
          </button>
          <button class="select-card" data-start="metro">
            <span class="select-icon">🎫</span>
            <span><strong>지하철 1회용 교통카드</strong><small>발매기 화면, 목적지 선택, 요금 결제</small></span>
            <b>시작하기</b>
          </button>
          <button class="select-card" data-start="gtx">
            <span class="select-icon">🚇</span>
            <span><strong>GTX-A 이용</strong><small>1회용 카드 발급, 개찰구 이용, 환급</small></span>
            <b>시작하기</b>
          </button>
        </div>
      </section>
    </section>

    <section id="practice" class="practice-page hidden" aria-live="polite">
      <div class="practice-toolbar">
        <button type="button" data-action="home">← 연습 선택</button>
        <div><small id="practice-category"></small><h2 id="practice-title"></h2></div>
        <button type="button" data-action="restart">처음부터</button>
      </div>
      <div class="progress-shell"><div id="progress-bar"></div></div>
      <p id="progress-text" class="progress-text"></p>

      <div class="practice-layout">
        <aside class="guide-panel">
          <span>지금 할 일</span>
          <h3 id="guide-title"></h3>
          <p id="guide-text"></p>
          <button type="button" data-action="step-speak">🔊 설명 듣기</button>
          <button type="button" data-action="hint">💡 힌트 보기</button>
          <div id="hint-box" class="hint-box hidden"></div>
          <div class="counter-row"><span>실수 <b id="mistakes">0</b>회</span><span>도움 <b id="hints">0</b>회</span></div>
        </aside>
        <section class="simulation-stage"><div id="simulator"></div></section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>
  <footer>교육용 모의 화면 · 실제 예약·결제·송금이 이루어지지 않습니다</footer>
</body>
</html>
